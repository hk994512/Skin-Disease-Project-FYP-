name: clearskin_ai
description: "Empower yourself with a smart health companion that uses AI to detect skin conditions from a photo, offering instant insights and treatment recommendations with a beautiful, user-friendly interface."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter  
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  image_picker: ">=1.1.2"
  http: ^1.6.0
  shared_preferences: ^2.0.0
  uuid: ^4.0.0
  intl: 0.20.2
  path_provider: ^2.0.0
  flutter_riverpod: ^3.0.3
  lottie: ^3.3.2
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  go_router: ^17.1.0
  awesome_extensions: ^2.1.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.6
  # image_cropper: ^12.2.1
  tflite_flutter: ^0.12.1
  image: ^4.2.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  pdf: ^3.11.1
  printing: ^5.13.1
  open_file: ^3.3.2
  http_parser: ^4.1.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: true
  # image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
